version: 2

sources:
  - name: raw
    database: finsage_db
    schema: raw
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: raw_stock_prices
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: ingested_at
      - name: raw_fundamentals
        freshness:
          warn_after: {count: 168, period: hour}
          error_after: {count: 336, period: hour}
        loaded_at_field: ingested_at
      - name: raw_news
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: ingested_at
      - name: raw_sec_filings
        freshness:
          warn_after: {count: 168, period: hour}
          error_after: {count: 720, period: hour}
        loaded_at_field: ingested_at
      - name: raw_sec_filing_documents
        freshness:
          warn_after: {count: 168, period: hour}
          error_after: {count: 720, period: hour}
        loaded_at_field: ingested_at

models:
  - name: stg_stock_prices
    description: "Cleaned and validated stock price data"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: date
        description: "Trading date"
        tests:
          - not_null
      - name: close
        description: "Closing price"
        tests:
          - not_null
      - name: is_valid
        description: "Data quality validation flag"

  - name: stg_sec_filing_documents
    description: "Cleaned SEC filing documents with extracted MD&A and Risk Factors text"
    columns:
      - name: filing_id
        description: "SEC accession number (unique filing identifier)"
        tests:
          - not_null
          - unique
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: form_type
        description: "Filing type (10-K or 10-Q)"
        tests:
          - not_null
          - accepted_values:
              values: ["10-K", "10-Q"]
      - name: extraction_status
        description: "Text extraction status"
        tests:
          - accepted_values:
              values: ["extracted", "pending", "failed"]
      - name: has_mda
        description: "Whether MD&A text was extracted"
      - name: has_risk_factors
        description: "Whether Risk Factors text was extracted"
      - name: data_quality_score
        description: "Quality score 0-100"
